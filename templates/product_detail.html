{% extends 'base.html' %}

{% block title %}
{{ product.name }} | ShopEase
{% endblock %}

{% block content %}

<div class="row mt-4">

<div class="col-md-6">

<img src="{{ product.image.url }}"
class="img-fluid rounded shadow">

</div>

<div class="col-md-6">

<h1 class="fw-bold">

{{ product.name }}

</h1>

<h2 class="text-success">

₹{{ product.price }}

</h2>

<p class="mt-4">

{{ product.description }}

</p>

<div class="d-grid gap-2">

<a href="{% url 'add_to_cart' product.id %}"
class="btn btn-success btn-lg">

🛒 Add To Cart

</a>

<a href="/"
class="btn btn-outline-secondary">

⬅ Back to Home

</a>

</div>

</div>

</div>

{% endblock %}
